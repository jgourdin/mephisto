name: tests
on:
  pull_request:
  push:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Tests unitaires
        run: node --test test/*.test.js
      - name: Vérification syntaxe des sources
        run: node --check src/*.js && node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))"
